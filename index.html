<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>009805 電力基建終端監測站</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --blue: #38bdf8;
            --green: #22c55e;
            --orange: #fbbf24;
            --text: #f1f5f9;
            --border: #334155;
            --danger: #ef4444;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1500px; margin: 0 auto; }
        
        /* 頂部導航與計數器 */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .visitor-counter { color: var(--blue); font-family: monospace; background: rgba(56, 189, 248, 0.1); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); font-weight: bold; }
        
        /* Dashboard Header */
        .header { background: linear-gradient(135deg, #1e40af 0%, #0f172a 100%); padding: 30px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .status-light { background: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid var(--green); padding: 5px 15px; border-radius: 20px; font-weight: bold; animation: pulse 2s infinite; }

        /* 動態預估數據條 */
        .market-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .indicator { background: var(--card); padding: 20px; border-radius: 10px; border-left: 5px solid var(--blue); text-align: center; border: 1px solid var(--border); }
        .ind-label { font-size: 14px; color: #94a3b8; display: block; margin-bottom: 8px; }
        .ind-val { font-size: 24px; font-weight: bold; }

        /* Main Table */
        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #0f172a; padding: 15px; font-size: 13px; color: #94a3b8; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: #334155; transition: 0.2s; }
        
        .ticker { font-weight: bold; color: var(--blue); }
        .weight-tag { background: rgba(56, 189, 248, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--green); border: 1px solid rgba(34, 197, 94, 0.3); }
        
        /* Chart & News Section */
        .flex-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-box { background: var(--card); padding: 20px; border-radius: 12px; height: 550px; border: 1px solid var(--border); }
        .news-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .news-item { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .news-item a { color: var(--blue); text-decoration: none; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .update-time { text-align: center; color: #64748b; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <div style="font-weight: bold; color: var(--blue);">⚡ 009805 專業監測終端 (50檔自動同步)</div>
