<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>009805 成分股監控站</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --up-color: #22c55e;
            --down-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-label {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 800;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #334155;
            color: var(--text-dim);
            text-align: left;
            padding: 12px 15px;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #334155;
        }

        .ticker {
            font-weight: bold;
            color: var(--accent-blue);
        }

        .weight-tag {
            background: #0ea5e920;
            color: var(--accent-blue);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .footer {
            margin-top: 20px;
            text-align: right;
            font-size: 12px;
            color: var(--text-dim);
        }

        /* 響應式 */
        @media (max-width: 600px) {
            .summary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title"><i class="fa-solid fa-bolt"></i> 009805 監控站</div>
            <div id="update-time" style="color: var(--text-dim); font-size: 12px;">更新時間：</div>
        </div>

        <div class="summary-grid">
            <div class="card">
                <div class="card-label">美股成分股總影響</div>
                <div class="card-value" style="color: var(--up-color);"></div>
            </div>
            <div class="card">
                <div class="card-label">台幣匯率變動 (FX)</div>
                <div class="card-value" style="color: var(--accent-blue);"></div>
            </div>
            <div class="card">
                <div class="card-label">預估 009805 總漲跌</div>
                <div class="card-value" style="color: var(--up-color); border: 2px solid var(--accent-blue); border-radius: 8px; padding: 5px;"></div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>代號</th>
                    <th>單日漲跌</th>
                    <th>佔比權重</th>
                    <th>貢獻度</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <div class="footer">
            數據來源：Yahoo Finance (美股兩日收盤價差計算)
        </div>
    </div>
</body>
</html>
