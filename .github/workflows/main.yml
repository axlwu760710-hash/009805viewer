name: Daily 009805 Update

on:
  schedule:
    - cron: '0 21 * * *' # 每天台灣時間凌晨 5 點執行
  workflow_dispatch: # 讓你能手動點擊按鈕執行

# 強制使用 Node.js 24 環境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 關鍵：確保 GitHub 有權限幫你修改 index.html
    steps:
      # 升級至 v4
      - name: Checkout code
        uses: actions/checkout@v4

      # 升級至 v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Update Dashboard Data
        # 如果這一步失敗，請檢查 update_data.py 是否在根目錄
        run: python update_data.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          # 只有在 index.html 有變動時才推送，避免報錯
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "自動更新 50 檔成分股數據"
            git push
          fi
