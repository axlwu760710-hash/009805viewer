name: Daily 009805 Update

on:
  schedule:
    - cron: '0 21 * * *' # 每天台灣時間凌晨 5 點執行
  workflow_dispatch: # 讓你能手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 更新為 v4 版本，解決 Node.js 20 警告
      - name: Checkout code
        uses: actions/checkout@v4

      # 更新為 v5 版本，解決 Node.js 20 警告
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Update Dashboard Data
        # 加入此行確保 Python 報錯時我們會知道原因
        run: python update_data.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          # 只有在檔案有變動時才 commit，避免重複報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新 50 檔成分股數據" && git push)
